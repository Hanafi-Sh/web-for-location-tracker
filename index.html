<!DOCTYPE html>
<html>
<head>
    <title>Pusat Komando Radar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; display: flex; height: 100vh; background: #111; color: #fff; overflow: hidden; }
        
        /* Layout & Animasi Sidebar */
        #sidebar { 
            width: 320px; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid #333; 
            z-index: 1000; 
            transition: margin-left 0.3s ease, height 0.3s ease; /* Efek meluncur mulus */
        }
        #sidebar.collapsed { 
            margin-left: -320px; /* Menyembunyikan dashboard ke samping kiri */
        }
        #map { flex-grow: 1; height: 100vh; z-index: 1; }
        
        /* Tombol Buka/Tutup Dashboard */
        #toggleBtn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 2000; 
            background: #222; 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            padding: 8px 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-family: inherit; 
            font-weight: bold; 
            transition: 0.3s; 
            box-shadow: 0 0 10px rgba(0,255,0,0.2); 
        }
        #toggleBtn:hover { background: #00ff00; color: #000; }
        
        /* Elemen Dashboard */
        .header { padding: 15px; background: #000; text-align: center; border-bottom: 1px solid #333; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; font-weight: bold; background: #333; }
        
        /* Navigasi Tab */
        .tabs { display: flex; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 10px; background: #222; color: gray; border: none; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #333; color: #00ff00; border-bottom: 2px solid #00ff00; }
        
        /* Area Konten (Daftar & Log) */
        .content-area { flex-grow: 1; overflow-y: auto; padding: 10px; display: none; }
        .content-area.active { display: block; }
        
        /* Kartu Perangkat */
        .device-card { background: #2a2a2a; margin-bottom: 10px; padding: 10px; border-radius: 5px; border-left: 4px solid #00ff00; cursor: pointer; transition: 0.2s; }
        .device-card:hover { background: #333; }
        .device-card.trash-card { border-left-color: red; cursor: default; }
        .device-card .device-name { font-size: 16px; font-weight: bold; color: #fff; }
        .device-card .device-time { font-size: 12px; color: #aaa; margin-top: 5px; }
        .action-btn { margin-top: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; border: none; border-radius: 3px; font-family: inherit; }
        .btn-del { background: #cc0000; color: white; }
        
        /* Log Area */
        #logArea { font-size: 12px; color: #00ff00; line-height: 1.5; }
        
        /* Tampilan Khusus HP */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 2px solid #333; }
            #sidebar.collapsed { margin-left: 0; height: 0; border-bottom: none; overflow: hidden; } /* Di HP, sembunyi ke atas */
            #map { height: 60vh; }
        }
    </style>
</head>
<body>

    <button id="toggleBtn" onclick="toggleSidebar()">☰ MENU</button>

    <div id="sidebar">
        <div class="header">
            <h2>COMMAND CENTER</h2>
            <div id="statusBadge" class="status-badge">Menghubungkan...</div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="bukaTab('aktifTab', this)">AKTIF</button>
            <button class="tab-btn" onclick="bukaTab('trashTab', this)">TRASH</button>
            <button class="tab-btn" onclick="bukaTab('logTab', this)">LOGS</button>
        </div>

        <div id="aktifTab" class="content-area active"></div>
        <div id="trashTab" class="content-area"></div>
        <div id="logTab" class="content-area">
            <div id="logArea">Sistem Diinisialisasi...<br></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-6.200000, 106.816666], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        var semuaMarker = {}; 

        // --- FITUR BARU: Menutup/Membuka Sidebar ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            
            // Memberi waktu 0.3 detik agar animasi CSS selesai, lalu paksa peta menyesuaikan ukuran
            setTimeout(() => { map.invalidateSize(); }, 300);
        }
        // -------------------------------------------

        function bukaTab(tabId, elemenTombol) {
            document.querySelectorAll('.content-area').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            elemenTombol.classList.add('active');
            if(tabId === 'trashTab') ambilDataTrash(); 
        }

        function tambahLog(pesan) {
            const logBox = document.getElementById('logArea');
            // Memaksa log layar menggunakan jam Jakarta
            const waktu = new Date().toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta' });
            logBox.innerHTML += `[${waktu}] ${pesan}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function fokusKeTarget(lat, lon) {
            map.flyTo([lat, lon], 16, { animate: true, duration: 1 });
        }

        window.pindahKeTrash = async function(idTarget, namaTarget, event) {
            event.stopPropagation(); 
            const konfirmasi = confirm(`Pindahkan "${namaTarget}" ke Trash?`);
            if (konfirmasi) {
                try {
                    await fetch(`/api/hapus?id=${idTarget}`);
                    if (semuaMarker[idTarget]) {
                        map.removeLayer(semuaMarker[idTarget]);
                        delete semuaMarker[idTarget];
                    }
                    tambahLog(`⚠️ ${namaTarget} dipindah ke Trash.`);
                    ambilLokasi(); 
                } catch (error) {
                    tambahLog(`❌ Gagal menghapus.`);
                }
            }
        }

        async function ambilLokasi() {
            try {
                const response = await fetch('/api/lokasi');
                const dataPerangkat = await response.json(); 
                const boxAktif = document.getElementById('aktifTab');
                let htmlAktif = '';
                
                let jumlahAktif = Object.values(dataPerangkat).filter(info => info && info.lat && info.lon).length;
                document.getElementById('statusBadge').innerText = jumlahAktif > 0 ? `🟢 ${jumlahAktif} TARGET AKTIF` : `🔴 MENUNGGU TARGET`;
                document.getElementById('statusBadge').style.color = jumlahAktif > 0 ? "#00ff00" : "red";

                for (const idTarget in dataPerangkat) {
                    const info = dataPerangkat[idTarget];
                    if (info.lat && info.lon) {
                        if (semuaMarker[idTarget]) {
                            semuaMarker[idTarget].setLatLng([info.lat, info.lon]);
                            semuaMarker[idTarget].getPopup().setContent(`<b>${info.nama}</b><br>Update: ${info.waktu}`);
                        } else {
                            const markerBaru = L.marker([info.lat, info.lon]).addTo(map);
                            markerBaru.bindPopup(`<b>${info.nama}</b><br>Update: ${info.waktu}`);
                            semuaMarker[idTarget] = markerBaru;
                            tambahLog(`+ Terdeteksi: ${info.nama}`);
                        }

                        htmlAktif += `
                            <div class="device-card" onclick="fokusKeTarget(${info.lat}, ${info.lon})">
                                <div class="device-name">${info.nama}</div>
                                <div class="device-time">📍 Lat: ${info.lat.toFixed(4)}, Lon: ${info.lon.toFixed(4)}<br>⏱ Terakhir: ${info.waktu}</div>
                                <button class="action-btn btn-del" onclick="pindahKeTrash('${idTarget}', '${info.nama}', event)">Pindah ke Trash</button>
                            </div>
                        `;
                    }
                }
                
                boxAktif.innerHTML = htmlAktif || "<div style='color:gray; text-align:center;'>Tidak ada target aktif</div>";
                
            } catch (error) {
                tambahLog(`❌ Sinkronisasi gagal.`);
            }
        }

        async function ambilDataTrash() {
            try {
                const response = await fetch('/api/trash');
                const dataTrash = await response.json();
                const boxTrash = document.getElementById('trashTab');
                let htmlTrash = '';

                for (const idTarget in dataTrash) {
                    const info = dataTrash[idTarget];
                    htmlTrash += `
                        <div class="device-card trash-card">
                            <div class="device-name">${info.nama} (Dihapus)</div>
                            <div class="device-time">Lokasi Terakhir:<br>📍 ${info.lat.toFixed(4)}, ${info.lon.toFixed(4)}<br>⏱ ${info.waktu}</div>
                        </div>
                    `;
                }
                boxTrash.innerHTML = htmlTrash || "<div style='color:gray; text-align:center;'>Trash kosong</div>";
            } catch (error) {
                console.error("Gagal memuat trash");
            }
        }

        setInterval(ambilLokasi, 5000); 
        ambilLokasi();
    </script>
</body>
</html>
