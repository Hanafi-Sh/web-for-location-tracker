<!DOCTYPE html>
<html>
<head>
    <title>Radar Pelacak Siluman</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .info { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 999; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-weight: bold;}
        /* Kotak Terminal Baru */
        #logBox { position: absolute; bottom: 20px; left: 20px; z-index: 999; background: rgba(0,0,0,0.8); color: #00FF00; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 5px; width: 300px; height: 150px; overflow-y: auto; border: 1px solid #00FF00; }
    </style>
</head>
<body>
    <div class="info" id="status">🔴 Sistem Offline / Menunggu Data</div>
    <div id="logBox">
        <div>> Memulai Radar Vercel...</div>
        <div>> Menunggu sinyal dari target...</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([-6.200000, 106.816666], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        var semuaMarker = {}; 

        function tambahLog(pesan) {
            const logBox = document.getElementById('logBox');
            const waktu = new Date().toLocaleTimeString('id-ID');
            logBox.innerHTML += `<div>[${waktu}] ${pesan}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- FITUR BARU: Fungsi untuk menembak API hapus ---
        window.hapusTarget = async function(idTarget, namaTarget) {
            const konfirmasi = confirm(`Tembak jatuh dan hapus "${namaTarget}" dari radar?`);
            if (konfirmasi) {
                try {
                    await fetch(`/api/hapus?id=${idTarget}`);
                    
                    // Hilangkan titik dari peta seketika
                    if (semuaMarker[idTarget]) {
                        map.removeLayer(semuaMarker[idTarget]);
                        delete semuaMarker[idTarget];
                    }
                    tambahLog(`💥 Target dihapus: ${namaTarget}`);
                    ambilLokasi(); // Segarkan jumlah perangkat
                } catch (error) {
                    tambahLog(`⚠️ Gagal menghapus target.`);
                }
            }
        }
        // ---------------------------------------------------

        async function ambilLokasi() {
            try {
                const response = await fetch('/api/lokasi');
                const dataPerangkat = await response.json(); 
                
                if (dataPerangkat.error) {
                    tambahLog(`⚠️ Error: ${dataPerangkat.error}`);
                    return; 
                }

                let jumlahPerangkat = Object.keys(dataPerangkat).length;
                
                if (jumlahPerangkat > 0) {
                    document.getElementById('status').innerText = `🟢 MELACAK ${jumlahPerangkat} PERANGKAT AKTIF`;
                    document.getElementById('status').style.color = "green";

                    for (const idTarget in dataPerangkat) {
                        const info = dataPerangkat[idTarget];
                        
                        if (info.lat && info.lon) {
                            // Membuat isi kotak info (Popup) beserta tombol hapusnya
                            const isiPopup = `
                                <div style="text-align:center;">
                                    <b>${info.nama}</b><br>
                                    <span style="font-size: 12px; color: gray;">Update: ${info.waktu}</span><br>
                                    <button onclick="hapusTarget('${idTarget}', '${info.nama}')" style="margin-top: 8px; background: red; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px;">❌ Hapus</button>
                                </div>
                            `;

                            if (semuaMarker[idTarget]) {
                                semuaMarker[idTarget].setLatLng([info.lat, info.lon]);
                                semuaMarker[idTarget].getPopup().setContent(isiPopup);
                            } else {
                                const markerBaru = L.marker([info.lat, info.lon]).addTo(map);
                                markerBaru.bindPopup(isiPopup).openPopup();
                                semuaMarker[idTarget] = markerBaru;
                                tambahLog(`+ Perangkat terdeteksi: ${info.nama}`);
                            }
                        }
                    }
                } else {
                    document.getElementById('status').innerText = "🔴 Sistem Aktif / Menunggu Data Perangkat";
                }
            } catch (error) {
                tambahLog(`⚠️ Koneksi Peta Error: ${error.message}`);
            }
        }

        setInterval(ambilLokasi, 5000);
        ambilLokasi();
    </script>
</body>
</html>
